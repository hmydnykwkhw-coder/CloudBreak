      <text x="50" y="137">╚═════╝ ╚══════╝  ╚═════╝   ╚═════╝  ╚═════╝  ╚══════╝</text>
   
      <text x="50" y="162">██████╗  ██████╗  ███████╗  █████╗  ██╗  ██╗</text>
      <text x="50" y="177">██╔══██╗ ██╔══██╗ ██╔════╝ ██╔══██╗ ██║ ██╔╝</text>
