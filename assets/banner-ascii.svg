<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0d122b"/>
    </linearGradient>

    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color"
          values="#00f0ff;#8b5cf6;#ff00aa;#00ff99;#ffaa00;#00f0ff"
          dur="7s"
          repeatCount="indefinite"/>
      </stop>

      <stop offset="50%">
        <animate attributeName="stop-color"
          values="#ff00aa;#00ff99;#ffaa00;#00f0ff;#8b5cf6;#ff00aa"
          dur="9s"
          repeatCount="indefinite"/>
      </stop>

      <stop offset="100%">
        <animate attributeName="stop-color"
          values="#00ff99;#ffaa00;#00f0ff;#ff00aa;#8b5cf6;#00ff99"
          dur="8s"
          repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <rect width="900" height="360" rx="18" fill="url(#bg)"/>

  <g opacity="0.7">

    <circle cx="120" cy="70" r="2" fill="#00f0ff">
      <animate attributeName="cy" values="70;40;70" dur="6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="760" cy="90" r="2" fill="#ff00aa">
      <animate attributeName="cy" values="90;120;90" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="220" cy="290" r="2" fill="#00ff99">
      <animate attributeName="cx" values="220;260;220" dur="7s" repeatCount="indefinite"/>
    </circle>

    <circle cx="680" cy="260" r="2" fill="#ffaa00">
      <animate attributeName="cx" values="680;640;680" dur="8s" repeatCount="indefinite"/>
    </circle>

  </g>

  <rect x="10" y="10" width="880" height="340" rx="14"
    fill="none"
    stroke="url(#grad)"
    stroke-width="2"
    filter="url(#glow)"/>

  <rect x="18" y="18" width="864" height="324" rx="10"
    fill="none"
    stroke="url(#grad)"
    stroke-opacity="0.25"/>

  <text
    x="450"
    y="125"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="14.5"
    font-weight="0"
    letter-spacing="0"
    fill="url(#grad)"
    filter="url(#glow)"
    xml:space="preserve">

