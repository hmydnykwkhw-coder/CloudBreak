name: "⚡ Deploy CloudBreak Worker"

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: "Worker name (unique in your Cloudflare account)"
        required: true
        default: "vless-ir"
      proxy_ip:
        description: "PROXYIP (optional) — relay IP if workers.dev is blocked in your region"
        required: false
        default: ""

concurrency:
  group: deploy-cloudbreak
  cancel-in-progress: false

jobs:
  deploy:
    name: "CloudBreak — VLESS + VMess Proxy"
    runs-on: ubuntu-latest

    steps:

      # ══════════════════════════════════════════════════════════════════════
      # 1 ▸ Checkout
      # ══════════════════════════════════════════════════════════════════════
      - name: "📦 Checkout"
        uses: actions/checkout@v4

      # ══════════════════════════════════════════════════════════════════════
      # 2 ▸ Validate secrets
      # ══════════════════════════════════════════════════════════════════════
      - name: "🔐 Validate secrets"
        run: |
          FAIL=0
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error title=Missing Secret::CLOUDFLARE_API_TOKEN is not set"
            FAIL=1
          else
            echo "✅ CLOUDFLARE_API_TOKEN present"
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error title=Missing Secret::CLOUDFLARE_ACCOUNT_ID is not set"
            FAIL=1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID present"
          fi
          [ "${FAIL}" -eq 0 ] || exit 1

      # ══════════════════════════════════════════════════════════════════════
      # 3 ▸ Install tools
      # ══════════════════════════════════════════════════════════════════════
      - name: "🔧 Install Wrangler + Python deps"
        run: |
          for attempt in 1 2 3; do
            npm install -g wrangler && break
            [ "${attempt}" -eq 3 ] && { echo "::error title=Install Failed::wrangler install failed"; exit 1; }
            sleep 5
          done
          echo "✅ $(wrangler --version)"

          if pip install "qrcode[pil]" pillow --quiet 2>/dev/null; then
            echo "QRCODE_OK=true" >> "$GITHUB_ENV"
            echo "✅ qrcode ready"
          else
            echo "QRCODE_OK=false" >> "$GITHUB_ENV"
            echo "::warning title=QR Skip::qrcode install failed"
          fi

      # ══════════════════════════════════════════════════════════════════════
      # 4 ▸ Validate worker.js
      # ══════════════════════════════════════════════════════════════════════
      - name: "📄 Validate worker.js"
        run: |
          if [ ! -f "worker.js" ]; then
            echo "::error title=Missing File::worker.js not found in repo root"
            exit 1
          fi
          SIZE=$(wc -c < worker.js)
          LINES=$(wc -l < worker.js)
          [ "${SIZE}" -eq 0 ] && { echo "::error title=Empty File::worker.js is 0 bytes"; exit 1; }
          grep -q "export default" worker.js || { echo "::error title=Invalid Worker::No 'export default' found"; exit 1; }
          echo "✅ worker.js OK — ${LINES} lines, ${SIZE} bytes"

      # ══════════════════════════════════════════════════════════════════════
      # 5 ▸ Generate credentials
      # ══════════════════════════════════════════════════════════════════════
      - name: "🔑 Generate UUID + paths"
        id: keygen
        run: |
          UUID=$(cat /proc/sys/kernel/random/uuid)
          echo "${UUID}" | grep -qE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$' \
            || { echo "::error title=Keygen Failed::UUID invalid: ${UUID}"; exit 1; }

          WS_PATH="/$(openssl rand -hex 6)"
          SUB_PATH="/$(openssl rand -hex 8)"
          DEPLOY_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          echo "✅ UUID:     ${UUID}"
          echo "✅ WS Path:  ${WS_PATH}"
          echo "✅ Sub Path: ${SUB_PATH}"
          echo "✅ Time:     ${DEPLOY_TIME}"

          {
            echo "uuid=${UUID}"
            echo "ws_path=${WS_PATH}"
            echo "sub_path=${SUB_PATH}"
            echo "deploy_time=${DEPLOY_TIME}"
          } >> "$GITHUB_OUTPUT"

      # ══════════════════════════════════════════════════════════════════════
      # 6 ▸ Deploy
      # ══════════════════════════════════════════════════════════════════════
      - name: "🚀 Deploy to Cloudflare Workers"
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WORKER_NAME="${{ github.event.inputs.worker_name }}"
          UUID="${{ steps.keygen.outputs.uuid }}"
          WS_PATH="${{ steps.keygen.outputs.ws_path }}"
          SUB_PATH="${{ steps.keygen.outputs.sub_path }}"
          DEPLOY_TIME="${{ steps.keygen.outputs.deploy_time }}"
          PROXY_IP="${{ github.event.inputs.proxy_ip }}"

          # ── Get workers.dev subdomain ─────────────────────────────────────
          API_RESP=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")

          CF_SUBDOMAIN=$(echo "${API_RESP}" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['result']['subdomain'] if d.get('success') and d.get('result') else '')" \
            2>/dev/null || echo "")

          if [ -n "${CF_SUBDOMAIN}" ]; then
            WORKER_URL="https://${WORKER_NAME}.${CF_SUBDOMAIN}.workers.dev"
            HOST="${WORKER_NAME}.${CF_SUBDOMAIN}.workers.dev"
            echo "✅ Subdomain: ${CF_SUBDOMAIN}"
          else
            WORKER_URL=""
            HOST=""
            echo "⚠️  Could not get subdomain — will extract from wrangler output"
          fi

          # ── Write wrangler.toml ──────────────────────────────────────────
          printf 'name = "%s"\n'                             "${WORKER_NAME}"  > wrangler.toml
          printf 'main = "worker.js"\n'                                        >> wrangler.toml
          printf 'compatibility_date = "2025-01-01"\n'                         >> wrangler.toml
          printf 'workers_dev = true\n'                                        >> wrangler.toml
          printf 'compatibility_flags = ["nodejs_compat"]\n'                   >> wrangler.toml
          printf '\n[vars]\n'                                                   >> wrangler.toml
          printf 'UUID = "%s"\n'                             "${UUID}"         >> wrangler.toml
          printf 'WS_PATH = "%s"\n'                          "${WS_PATH}"      >> wrangler.toml
          printf 'SUB_PATH = "%s"\n'                         "${SUB_PATH}"     >> wrangler.toml
          printf 'DEPLOY_TIME = "%s"\n'                      "${DEPLOY_TIME}"  >> wrangler.toml
          [ -n "${PROXY_IP}" ] && printf 'PROXYIP = "%s"\n' "${PROXY_IP}"     >> wrangler.toml
          cat wrangler.toml

          # ── Deploy with retry ────────────────────────────────────────────
          DEPLOY_EXIT=1
          for attempt in 1 2 3; do
            echo "── Deploy attempt ${attempt}/3 ──"
            set +e
            wrangler deploy worker.js 2>&1 | tee /tmp/wrangler.log
            DEPLOY_EXIT=${PIPESTATUS[0]}
            set -e
            if [ "${DEPLOY_EXIT}" -eq 0 ]; then
              echo "✅ Deploy succeeded"
              break
            fi
            LOG=$(cat /tmp/wrangler.log)
            if echo "${LOG}" | grep -qi "10000\|10063\|Forbidden\|401\|403\|authentication\|API token"; then
              echo "::error title=Auth Error::Invalid API token or missing permissions"
              exit 1
            fi
            if echo "${LOG}" | grep -qi "SyntaxError\|Unexpected token\|Parse error"; then
              echo "::error title=Syntax Error::worker.js has a syntax/parse error"
              exit 1
            fi
            [ "${attempt}" -lt 3 ] && sleep 10
          done

          # ── Extract URL ───────────────────────────────────────────────────
          if [ -z "${WORKER_URL}" ]; then
            WORKER_URL=$(grep -oP 'https://[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.workers\.dev' \
              /tmp/wrangler.log | head -1 || echo "")
            if [ -n "${WORKER_URL}" ]; then
              HOST=$(echo "${WORKER_URL}" | sed 's|https://||')
            elif [ "${DEPLOY_EXIT}" -eq 0 ]; then
              WORKER_URL="https://${WORKER_NAME}.workers.dev"
              HOST="${WORKER_NAME}.workers.dev"
            else
              echo "::error title=Deploy Failed::wrangler exit ${DEPLOY_EXIT}"
              cat /tmp/wrangler.log; exit 1
            fi
          fi

          # ── Health check ─────────────────────────────────────────────────
          HEALTH_OK=false
          for i in $(seq 1 18); do
            HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" \
              --max-time 8 --connect-timeout 5 \
              "${WORKER_URL}/health" 2>/dev/null || echo "000")
            echo "  [${i}/18] /health → HTTP ${HTTP}"
            if [ "${HTTP}" = "200" ]; then
              HEALTH_OK=true
              echo "✅ Worker is live!"
              break
            fi
            sleep 5
          done

          [ "${HEALTH_OK}" = "false" ] && [ "${DEPLOY_EXIT}" -ne 0 ] && {
            echo "::error title=Deploy Failed::Both wrangler and health check failed"
            exit 1
          }

          {
            echo "worker_url=${WORKER_URL}"
            echo "host=${HOST}"
            echo "health_ok=${HEALTH_OK}"
          } >> "$GITHUB_OUTPUT"

      # ══════════════════════════════════════════════════════════════════════
      # 7 ▸ Generate QR codes + summary
      # ══════════════════════════════════════════════════════════════════════
      - name: "📋 Generate QR codes and summary"
        env:
          UUID:        ${{ steps.keygen.outputs.uuid }}
          WS_PATH:     ${{ steps.keygen.outputs.ws_path }}
          SUB_PATH:    ${{ steps.keygen.outputs.sub_path }}
          DEPLOY_TIME: ${{ steps.keygen.outputs.deploy_time }}
          WORKER_URL:  ${{ steps.deploy.outputs.worker_url }}
          HOST:        ${{ steps.deploy.outputs.host }}
          HEALTH_OK:   ${{ steps.deploy.outputs.health_ok }}
          PROXY_IP:    ${{ github.event.inputs.proxy_ip }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/cb

          # ── 1. Generate links (Python via base64 — avoids heredoc conflict) ──
          echo "" \
            | base64 -d | python3
          echo "✅ Links generated"

          # ── 2. Generate QR as inline SVG ──────────────────────────────────
          if [ "${QRCODE_OK}" = "true" ]; then
            echo "" \
              | base64 -d | python3
            echo "✅ QR codes generated"
          fi

          # ── 3. Read files ──────────────────────────────────────────────────
          VLESS_LINK=$(cat /tmp/cb/vless.txt)
          VMESS_LINK=$(cat /tmp/cb/vmess.txt)
          SUB_URL=$(cat /tmp/cb/sub_url.txt)

          QR_VLESS="*(QR unavailable — pip install failed)*"
          QR_VMESS="*(QR unavailable — pip install failed)*"
          QR_SUB="*(QR unavailable — pip install failed)*"
          [ -f /tmp/cb/qr-vless.svg ] && QR_VLESS=$(cat /tmp/cb/qr-vless.svg)
          [ -f /tmp/cb/qr-vmess.svg ] && QR_VMESS=$(cat /tmp/cb/qr-vmess.svg)
          [ -f /tmp/cb/qr-sub.svg   ] && QR_SUB=$(cat /tmp/cb/qr-sub.svg)

          # ── 4. Status ──────────────────────────────────────────────────────
          [ "${HEALTH_OK}" = "true" ] && STATUS="🟢 LIVE" || STATUS="🟡 PROPAGATING"
          [ -n "${PROXY_IP}" ] && PROXY_INFO="\`${PROXY_IP}\`" || PROXY_INFO="*direct mode*"

          # ── 5. Write summary (at column 0 — no indent!) ───────────────────
          cat > "${GITHUB_STEP_SUMMARY}" << SUMMARY
<p align="center">
  <a href="#">
    <img src="assets/banner-ascii.svg" width="100%" />
  </a>
</p>

<p align="center">
<img src="https://readme-typing-svg.demolab.com?font=JetBrains+Mono&weight=700&size=16&pause=1000&color=00FFCC&center=true&vCenter=true&width=640&lines=VLESS+%2B+VMess+Ready;DPI-Proof+%E2%80%94+Real+TLS+%2B+Real+SNI;Cloudflare+Workers+%E2%80%94+Free+Forever" />
</p>

