name: "⚡ Deploy CloudBreak Worker"

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: "Cloudflare Worker name (must be unique in your account)"
        required: true
        default: "vless-ir"
      proxy_ip:
        description: "Optional PROXYIP — relay IP if workers.dev is blocked in target region"
        required: false
        default: ""

concurrency:
  group: deploy-vless-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy VLESS Proxy"
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: "📦 Checkout repository"
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Install tools
      # -----------------------------------------------------------------------
      - name: "🔧 Install Wrangler + Python deps"
        run: |
          npm install -g wrangler
          pip install "qrcode[pil]" --quiet 2>/dev/null || true
          echo "Wrangler version: $(wrangler --version)"

      # -----------------------------------------------------------------------
      # 3. Delete existing worker (ensures fresh keys every run)
      # -----------------------------------------------------------------------
      - name: "🗑️  Delete existing worker (if any)"
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler delete --name "${{ github.event.inputs.worker_name }}" --force \
            2>/dev/null || echo "Worker did not exist yet — continuing"

      # -----------------------------------------------------------------------
      # 4. Generate cryptographic keys
      # -----------------------------------------------------------------------
      - name: "🔑 Generate UUID, WS path, timestamp"
        id: keygen
        run: |
          # UUID from kernel entropy
          VLESS_UUID=$(cat /proc/sys/kernel/random/uuid)

          # Random WebSocket path — 12 random hex chars with leading slash
          WS_PATH="/$(openssl rand -hex 6)"

          # Deploy timestamp
          DEPLOY_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          echo "uuid=${VLESS_UUID}"   >> "$GITHUB_OUTPUT"
          echo "ws_path=${WS_PATH}"  >> "$GITHUB_OUTPUT"
          echo "deploy_time=${DEPLOY_TIME}" >> "$GITHUB_OUTPUT"

          echo "✅ UUID:      ${VLESS_UUID}"
          echo "✅ WS Path:   ${WS_PATH}"
          echo "✅ Timestamp: ${DEPLOY_TIME}"

      # -----------------------------------------------------------------------
      # 5. Deploy to Cloudflare Workers
      # -----------------------------------------------------------------------
      - name: "🚀 Deploy Worker to Cloudflare"
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Validate token exists
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN secret is not set."
            echo "   Go to Settings → Secrets → New repository secret"
            exit 1
          fi

          WORKER_NAME="${{ github.event.inputs.worker_name }}"
          UUID="${{ steps.keygen.outputs.uuid }}"
          WS_PATH="${{ steps.keygen.outputs.ws_path }}"
          DEPLOY_TIME="${{ steps.keygen.outputs.deploy_time }}"
          PROXY_IP="${{ github.event.inputs.proxy_ip }}"

          # Build --var flags
          VAR_FLAGS="--var UUID:${UUID} --var WS_PATH:${WS_PATH} --var DEPLOY_TIME:${DEPLOY_TIME}"
          if [ -n "${PROXY_IP}" ]; then
            VAR_FLAGS="${VAR_FLAGS} --var PROXYIP:${PROXY_IP}"
          fi

          echo "Deploying ${WORKER_NAME}…"

          DEPLOY_OUTPUT=$(wrangler deploy worker.js \
            --name "${WORKER_NAME}" \
            --compatibility-date 2024-12-01 \
            --compatibility-flag nodejs_compat \
            ${VAR_FLAGS} \
            2>&1)

          echo "${DEPLOY_OUTPUT}"

          # Extract the workers.dev URL from wrangler output
          WORKER_URL=$(echo "${DEPLOY_OUTPUT}" | grep -oP 'https://[a-zA-Z0-9_-]+\.workers\.dev' | head -1)

          if [ -z "${WORKER_URL}" ]; then
            echo "⚠️  Could not auto-detect worker URL from output."
            WORKER_URL="https://${WORKER_NAME}.$(echo ${CLOUDFLARE_ACCOUNT_ID} | head -c 8).workers.dev"
          fi

          HOST=$(echo "${WORKER_URL}" | sed 's|https://||')

          echo "worker_url=${WORKER_URL}" >> "$GITHUB_OUTPUT"
          echo "host=${HOST}"             >> "$GITHUB_OUTPUT"

          echo "✅ Deployed to: ${WORKER_URL}"

      # -----------------------------------------------------------------------
      # 6. Verify worker is live
      # -----------------------------------------------------------------------
      - name: "🩺 Health check"
        run: |
          WORKER_URL="${{ steps.deploy.outputs.worker_url }}"
          echo "Checking ${WORKER_URL}/health …"

          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${WORKER_URL}/health" || true)
            if [ "${STATUS}" = "200" ]; then
              echo "✅ Worker is live (attempt ${i})"
              exit 0
            fi
            echo "  Attempt ${i}/5 — got HTTP ${STATUS}, retrying in 5s…"
            sleep 5
          done

          echo "⚠️  Health check did not return 200 after 5 attempts."
          echo "   The worker may still be propagating. Try the /health URL manually."

      # -----------------------------------------------------------------------
      # 7. Generate configs, QR codes, and workflow summary
      # -----------------------------------------------------------------------
      - name: "📋 Generate links, QR codes, and summary"
        id: summary
        run: |
          UUID="${{ steps.keygen.outputs.uuid }}"
          WS_PATH="${{ steps.keygen.outputs.ws_path }}"
          DEPLOY_TIME="${{ steps.keygen.outputs.deploy_time }}"
          HOST="${{ steps.deploy.outputs.host }}"
          WORKER_URL="${{ steps.deploy.outputs.worker_url }}"
          SUB_URL="${WORKER_URL}/sub"

          # -- Generate VLESS link via Python (handles URL encoding correctly)
          VLESS_LINK=$(python3 - <<PYEOF
          import urllib.parse
          uuid = "${UUID}"
          host = "${HOST}"
          ws_path = "${WS_PATH}"
          params = urllib.parse.urlencode({
              "encryption": "none",
              "security": "tls",
              "sni": host,
              "fp": "chrome",
              "type": "ws",
              "host": host,
              "path": ws_path,
              "alpn": "h2,http/1.1",
          })
          print(f"vless://{uuid}@{host}:443?{params}#CF-VLESS-IR", end="")
          PYEOF
          )

          # -- Generate VMess link via Python
          VMESS_LINK=$(python3 - <<PYEOF
          import json, base64
          config = {
              "v":    "2",
              "ps":   "CF-VMess-IR",
              "add":  "${HOST}",
              "port": 443,
              "id":   "${UUID}",
              "aid":  0,
              "net":  "ws",
              "type": "none",
              "host": "${HOST}",
              "path": "${WS_PATH}",
              "tls":  "tls",
              "sni":  "${HOST}",
              "alpn": "h2,http/1.1",
              "fp":   "chrome",
          }
          b64 = base64.b64encode(json.dumps(config).encode()).decode()
          print(f"vmess://{b64}", end="")
          PYEOF
          )

          echo "vless_link=${VLESS_LINK}" >> "$GITHUB_OUTPUT"
          echo "vmess_link=${VMESS_LINK}" >> "$GITHUB_OUTPUT"

          # -- Generate QR codes
          mkdir -p /tmp/vless-config

          python3 - <<PYEOF
          import qrcode, base64, sys
          from qrcode.constants import ERROR_CORRECT_M

          def make_qr_b64(data, filename):
              qr = qrcode.QRCode(
                  version=None,
                  error_correction=ERROR_CORRECT_M,
                  box_size=6,
                  border=2,
              )
              qr.add_data(data)
              qr.make(fit=True)
              img = qr.make_image(fill_color="white", back_color="#0a0a2e")
              img.save(filename, format="PNG")
              with open(filename, "rb") as f:
                  return base64.b64encode(f.read()).decode()

          vless_link = "${VLESS_LINK}"
          sub_url    = "${SUB_URL}"

          qr1_b64 = make_qr_b64(vless_link, "/tmp/vless-config/qr-vless.png")
          qr2_b64 = make_qr_b64(sub_url,    "/tmp/vless-config/qr-sub.png")

          with open("/tmp/vless-config/qr-vless.b64", "w") as f:
              f.write(qr1_b64)
          with open("/tmp/vless-config/qr-sub.b64", "w") as f:
              f.write(qr2_b64)

          print("QR codes generated OK")
          PYEOF

          QR_VLESS_B64=$(cat /tmp/vless-config/qr-vless.b64)
          QR_SUB_B64=$(cat /tmp/vless-config/qr-sub.b64)

          # Save links for artifact
          echo "${VLESS_LINK}" > /tmp/vless-config/vless-link.txt
          echo "${VMESS_LINK}" > /tmp/vless-config/vmess-link.txt

          # -- Write workflow summary
          # We split the heredoc at dynamic base64 boundaries to prevent bash
          # from misinterpreting base64 content as variable references.

          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          <div align="center">

          # ⚡ CloudBreak — Proxy Deployed!

          *Your VLESS + VMess proxy is live on Cloudflare's global network*

          ---

          ## 📱 Scan to Connect

          <table><tr>
          <td align="center"><strong>VLESS Link QR</strong><br><sub>V2rayNG · Streisand · Hiddify</sub><br>
          SUMMARY_EOF

          # Append QR 1 base64 (dynamic — cannot be inside a quoted heredoc)
          printf '<img src="data:image/png;base64,' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/vless-config/qr-vless.b64       >> "$GITHUB_STEP_SUMMARY"
          printf '" width="200" height="200"/>'     >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          </td>
          <td align="center"><strong>Subscription URL QR</strong><br><sub>V2rayN · Clash.Meta · NekoBox</sub><br>
          SUMMARY_EOF

          # Append QR 2 base64
          printf '<img src="data:image/png;base64,' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/vless-config/qr-sub.b64         >> "$GITHUB_STEP_SUMMARY"
          printf '" width="200" height="200"/>'     >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          </td>
          </tr></table>

          </div>

          ---

          ## 🔗 Connection Links

          <table><tr>
          <th>VLESS Link</th><th>VMess Link</th>
          </tr><tr><td>
          SUMMARY_EOF

          printf '```\n' >> "$GITHUB_STEP_SUMMARY"
          echo "${VLESS_LINK}" >> "$GITHUB_STEP_SUMMARY"
          printf '```\n' >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          </td><td>
          SUMMARY_EOF

          printf '```\n' >> "$GITHUB_STEP_SUMMARY"
          echo "${VMESS_LINK}" >> "$GITHUB_STEP_SUMMARY"
          printf '```\n' >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'
          </td></tr></table>

          ### 📡 Subscription URL (import all configs at once)
          SUMMARY_EOF

          printf '```\n%s\n```\n' "${SUB_URL}" >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'

          ---

          ## ⚙️ Connection Details

          | Parameter | Value |
          |-----------|-------|
          SUMMARY_EOF

          printf '| Protocol | VLESS + VMess |\n'         >> "$GITHUB_STEP_SUMMARY"
          printf '| Server | `%s` |\n' "${HOST}"           >> "$GITHUB_STEP_SUMMARY"
          printf '| Port | `443` |\n'                      >> "$GITHUB_STEP_SUMMARY"
          printf '| UUID | `%s` |\n' "${UUID}"             >> "$GITHUB_STEP_SUMMARY"
          printf '| WS Path | `%s` |\n' "${WS_PATH}"       >> "$GITHUB_STEP_SUMMARY"
          printf '| TLS | `true` |\n'                      >> "$GITHUB_STEP_SUMMARY"
          printf '| SNI | `%s` |\n' "${HOST}"              >> "$GITHUB_STEP_SUMMARY"
          printf '| Fingerprint | `chrome` |\n'            >> "$GITHUB_STEP_SUMMARY"
          printf '| ALPN | `h2, http/1.1` |\n'            >> "$GITHUB_STEP_SUMMARY"
          printf '| Deployed | `%s` |\n' "${DEPLOY_TIME}"  >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'

          ---

          <details>
          <summary>🌐 Worker Endpoints</summary>

          | Endpoint | Purpose |
          |----------|---------|
          SUMMARY_EOF

          printf '| `%s%s` | WebSocket proxy entry point |\n' "${WORKER_URL}" "${WS_PATH}" >> "$GITHUB_STEP_SUMMARY"
          printf '| `%s/sub` | Base64 subscription feed |\n' "${WORKER_URL}"               >> "$GITHUB_STEP_SUMMARY"
          printf '| `%s/health` | JSON health check |\n' "${WORKER_URL}"                   >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY_EOF'

          </details>

          <details>
          <summary>🛡️ How DPI Evasion Works</summary>

          | What DPI inspects | What DPI actually sees |
          |-------------------|------------------------|
          | Destination IP | Cloudflare anycast IP (trusted CDN) |
          | TLS certificate | Genuine Cloudflare cert, valid chain |
          | SNI field | Real `*.workers.dev` hostname |
          | Protocol fingerprint | Standard TLS 1.3 (chrome profile) |
          | HTTP headers | Normal WebSocket upgrade request |
          | Traffic pattern | Indistinguishable from HTTPS browsing |
          | Port | 443 (never blocked) |

          </details>

          ---

          > 🔄 **Key rotation:** Re-run this workflow at any time to generate a new UUID and
          > WS path. The old worker is deleted first, so credentials are always fresh.
          > Share the **subscription URL** with clients — it always reflects the latest keys.

          SUMMARY_EOF

      # -----------------------------------------------------------------------
      # 8. Upload config artifact
      # -----------------------------------------------------------------------
      - name: "📎 Upload config artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "cloudbreak-config-${{ github.run_number }}"
          path: /tmp/vless-config/
          retention-days: 30
