name: "⚡ Deploy CloudBreak Worker"

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: "Worker name (unique in your Cloudflare account)"
        required: true
        default: "vless-ir"
      proxy_ip:
        description: "PROXYIP (optional) — relay IP if workers.dev is blocked in your region"
        required: false
        default: ""

concurrency:
  group: deploy-cloudbreak
  cancel-in-progress: false

jobs:
  deploy:
    name: "CloudBreak — VLESS + VMess Proxy"
    runs-on: ubuntu-latest

    steps:

      # ══════════════════════════════════════════════════════════════════════
      # 1 ▸ Checkout
      # ══════════════════════════════════════════════════════════════════════
      - name: "📦 Checkout"
        uses: actions/checkout@v4

      # ══════════════════════════════════════════════════════════════════════
      # 2 ▸ Validate secrets
      # ══════════════════════════════════════════════════════════════════════
      - name: "🔐 Validate secrets"
        run: |
          FAIL=0
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error title=Missing Secret::CLOUDFLARE_API_TOKEN is not set"
            echo "  → Settings → Secrets and variables → Actions → New repository secret"
            FAIL=1
          else
            echo "✅ CLOUDFLARE_API_TOKEN present"
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error title=Missing Secret::CLOUDFLARE_ACCOUNT_ID is not set"
            echo "  → Cloudflare Dashboard → Workers & Pages → right sidebar"
            FAIL=1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID present"
          fi
          [ "${FAIL}" -eq 0 ] || exit 1

      # ══════════════════════════════════════════════════════════════════════
      # 3 ▸ Install tools
      # ══════════════════════════════════════════════════════════════════════
      - name: "🔧 Install Wrangler + Python deps"
        run: |
          for attempt in 1 2 3; do
            npm install -g wrangler && break
            [ "${attempt}" -eq 3 ] && { echo "::error title=Install Failed::wrangler install failed"; exit 1; }
            sleep 5
          done
          echo "✅ $(wrangler --version)"

          if pip install "qrcode[pil]" pillow --quiet 2>/dev/null; then
            echo "QRCODE_OK=true" >> "$GITHUB_ENV"
            echo "✅ qrcode ready"
          else
            echo "QRCODE_OK=false" >> "$GITHUB_ENV"
            echo "::warning title=QR Skip::qrcode install failed — QR codes will be skipped"
          fi

      # ══════════════════════════════════════════════════════════════════════
      # 4 ▸ Validate worker.js
      # ══════════════════════════════════════════════════════════════════════
      - name: "📄 Validate worker.js"
        run: |
          echo "── Files in repo root ───────────────────────────────────"
          ls -la
          echo ""
          if [ ! -f "worker.js" ]; then
            echo "::error title=Missing File::worker.js not found in repo root"
            exit 1
          fi
          SIZE=$(wc -c < worker.js)
          LINES=$(wc -l < worker.js)
          [ "${SIZE}" -eq 0 ] && { echo "::error title=Empty File::worker.js is 0 bytes"; exit 1; }
          grep -q "export default" worker.js || { echo "::error title=Invalid Worker::No 'export default' found"; exit 1; }
          echo "✅ worker.js OK — ${LINES} lines, ${SIZE} bytes"

      # ══════════════════════════════════════════════════════════════════════
      # 5 ▸ Generate credentials
      # ══════════════════════════════════════════════════════════════════════
      - name: "🔑 Generate UUID + WS path"
        id: keygen
        run: |
          UUID=$(cat /proc/sys/kernel/random/uuid)
          echo "${UUID}" | grep -qE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$' \
            || { echo "::error title=Keygen Failed::UUID invalid: ${UUID}"; exit 1; }

          WS_PATH="/$(openssl rand -hex 6)"
          DEPLOY_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          echo "✅ UUID:    ${UUID}"
          echo "✅ WS Path: ${WS_PATH}"
          echo "✅ Time:    ${DEPLOY_TIME}"

          {
            echo "uuid=${UUID}"
            echo "ws_path=${WS_PATH}"
            echo "deploy_time=${DEPLOY_TIME}"
          } >> "$GITHUB_OUTPUT"

      # ══════════════════════════════════════════════════════════════════════
      # 6 ▸ Deploy
      # ══════════════════════════════════════════════════════════════════════
      - name: "🚀 Deploy to Cloudflare Workers"
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WORKER_NAME="${{ github.event.inputs.worker_name }}"
          UUID="${{ steps.keygen.outputs.uuid }}"
          WS_PATH="${{ steps.keygen.outputs.ws_path }}"
          DEPLOY_TIME="${{ steps.keygen.outputs.deploy_time }}"
          PROXY_IP="${{ github.event.inputs.proxy_ip }}"

          # ── Get workers.dev subdomain from Cloudflare API ────────────────
          echo "── Fetching workers.dev subdomain ───────────────────────"
          API_RESP=$(curl -s \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")
          echo "API response: ${API_RESP}"

          CF_SUBDOMAIN=$(echo "${API_RESP}" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['result']['subdomain'] if d.get('success') and d.get('result') else '')" \
            2>/dev/null || echo "")

          if [ -n "${CF_SUBDOMAIN}" ]; then
            WORKER_URL="https://${WORKER_NAME}.${CF_SUBDOMAIN}.workers.dev"
            HOST="${WORKER_NAME}.${CF_SUBDOMAIN}.workers.dev"
            echo "✅ Subdomain: ${CF_SUBDOMAIN} → ${WORKER_URL}"
          else
            WORKER_URL=""
            HOST=""
            echo "⚠️  Could not get subdomain — will extract from wrangler output"
          fi

          # ── Write wrangler.toml with printf (no heredoc indent bug) ──────
          echo "── Writing wrangler.toml ─────────────────────────────────"
          printf 'name = "%s"\n'                              "${WORKER_NAME}"  > wrangler.toml
          printf 'main = "worker.js"\n'                                        >> wrangler.toml
          printf 'compatibility_date = "2025-01-01"\n'                         >> wrangler.toml
          printf 'workers_dev = true\n'                                        >> wrangler.toml
          printf 'compatibility_flags = ["nodejs_compat"]\n'                   >> wrangler.toml
          printf '\n[vars]\n'                                                   >> wrangler.toml
          printf 'UUID = "%s"\n'                              "${UUID}"        >> wrangler.toml
          printf 'WS_PATH = "%s"\n'                           "${WS_PATH}"     >> wrangler.toml
          printf 'DEPLOY_TIME = "%s"\n'                       "${DEPLOY_TIME}" >> wrangler.toml
          [ -n "${PROXY_IP}" ] && printf 'PROXYIP = "%s"\n'  "${PROXY_IP}"    >> wrangler.toml

          echo "── wrangler.toml ─────────────────────────────────────────"
          cat wrangler.toml
          echo ""

          # ── Pre-deploy sanity check ───────────────────────────────────────
          echo "── Pre-deploy file check ─────────────────────────────────"
          ls -la worker.js wrangler.toml
          echo "worker.js: $(wc -c < worker.js) bytes"

          # ── Deploy with retry (explicit entrypoint always) ────────────────
          DEPLOY_EXIT=1
          for attempt in 1 2 3; do
            echo ""
            echo "── Deploy attempt ${attempt}/3 ──────────────────────────"
            set +e
            wrangler deploy worker.js 2>&1 | tee /tmp/wrangler.log
            DEPLOY_EXIT=${PIPESTATUS[0]}
            set -e
            echo "Wrangler exit: ${DEPLOY_EXIT}"

            if [ "${DEPLOY_EXIT}" -eq 0 ]; then
              echo "✅ Deploy succeeded on attempt ${attempt}"
              break
            fi

            LOG=$(cat /tmp/wrangler.log)
            if echo "${LOG}" | grep -qi "10000\|10063\|Forbidden\|401\|403\|authentication\|API token"; then
              echo "::error title=Auth Error::Invalid API token or missing permissions"
              exit 1
            fi
            if echo "${LOG}" | grep -qi "SyntaxError\|Unexpected token\|Parse error"; then
              echo "::error title=Syntax Error::worker.js has a syntax/parse error"
              exit 1
            fi
            [ "${attempt}" -lt 3 ] && echo "Retrying in 10s…" && sleep 10
          done

          # ── Extract URL from wrangler output if API call missed ───────────
          if [ -z "${WORKER_URL}" ]; then
            WORKER_URL=$(grep -oP 'https://[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.workers\.dev' \
              /tmp/wrangler.log | head -1 || echo "")
            if [ -n "${WORKER_URL}" ]; then
              HOST=$(echo "${WORKER_URL}" | sed 's|https://||')
              echo "✅ URL from wrangler output: ${WORKER_URL}"
            elif [ "${DEPLOY_EXIT}" -eq 0 ]; then
              WORKER_URL="https://${WORKER_NAME}.workers.dev"
              HOST="${WORKER_NAME}.workers.dev"
              echo "⚠️  Fallback URL: ${WORKER_URL}"
            else
              echo "::error title=Deploy Failed::wrangler exit ${DEPLOY_EXIT}, URL unknown"
              cat /tmp/wrangler.log
              exit 1
            fi
          fi

          echo ""
          echo "── Full wrangler output ──────────────────────────────────"
          cat /tmp/wrangler.log

          # ── Health check ─────────────────────────────────────────────────
          echo ""
          echo "── Health check (up to 90s) ──────────────────────────────"
          HEALTH_OK=false
          for i in $(seq 1 18); do
            HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" \
              --max-time 8 --connect-timeout 5 \
              "${WORKER_URL}/health" 2>/dev/null || echo "000")
            echo "  [${i}/18] ${WORKER_URL}/health → HTTP ${HTTP}"
            if [ "${HTTP}" = "200" ]; then
              HEALTH_OK=true
              echo "✅ Worker is live!"
              cat /tmp/health.json
              break
            fi
            sleep 5
          done

          [ "${HEALTH_OK}" = "false" ] && [ "${DEPLOY_EXIT}" -ne 0 ] && {
            echo "::error title=Deploy Failed::Both wrangler and health check failed"
            exit 1
          }

          {
            echo "worker_url=${WORKER_URL}"
            echo "host=${HOST}"
            echo "health_ok=${HEALTH_OK}"
          } >> "$GITHUB_OUTPUT"

      # ══════════════════════════════════════════════════════════════════════
      # 7 ▸ Generate links, QR codes, and beautiful summary
      # ══════════════════════════════════════════════════════════════════════
      - name: "📋 Generate configs, QR codes, and summary"
        run: |
          set -euo pipefail

          UUID="${{ steps.keygen.outputs.uuid }}"
          WS_PATH="${{ steps.keygen.outputs.ws_path }}"
          DEPLOY_TIME="${{ steps.keygen.outputs.deploy_time }}"
          WORKER_URL="${{ steps.deploy.outputs.worker_url }}"
          HOST="${{ steps.deploy.outputs.host }}"
          HEALTH_OK="${{ steps.deploy.outputs.health_ok }}"
          PROXY_IP="${{ github.event.inputs.proxy_ip }}"
          SUB_URL="${WORKER_URL}/sub"

          mkdir -p /tmp/cb

          # ── Generate links ────────────────────────────────────────────────
          python3 - <<PYEOF
          import urllib.parse, json, base64

          uuid    = "${UUID}"
          host    = "${HOST}"
          ws_path = "${WS_PATH}"
          worker  = "${WORKER_URL}"
          sub_url = "${SUB_URL}"
          deploy  = "${DEPLOY_TIME}"

          params = urllib.parse.urlencode({
              "encryption":"none","security":"tls","sni":host,
              "fp":"chrome","type":"ws","host":host,
              "path":ws_path,"alpn":"h2,http/1.1",
          })
          vless = f"vless://{uuid}@{host}:443?{params}#CF-VLESS-IR"

          cfg = {
              "v":"2","ps":"CF-VMess-IR","add":host,"port":443,"id":uuid,
              "aid":0,"net":"ws","type":"none","host":host,"path":ws_path,
              "tls":"tls","sni":host,"alpn":"h2,http/1.1","fp":"chrome",
          }
          vmess = "vmess://" + base64.b64encode(
              json.dumps(cfg, separators=(",",":")).encode()).decode()

          open("/tmp/cb/vless.txt",   "w").write(vless)
          open("/tmp/cb/vmess.txt",   "w").write(vmess)
          open("/tmp/cb/sub.txt",     "w").write(sub_url)
          open("/tmp/cb/config.json", "w").write(json.dumps({
              "generated":deploy,"worker_url":worker,
              "vless":vless,"vmess":vmess,"subscription":sub_url,
              "manual":{
                  "address":host,"port":443,"uuid":uuid,"ws_path":ws_path,
                  "tls":True,"sni":host,"fingerprint":"chrome",
                  "alpn":["h2","http/1.1"],"encryption":"none",
              }
          }, indent=2))
          print("✅ Links generated")
          PYEOF

          VLESS_LINK=$(cat /tmp/cb/vless.txt)
          VMESS_LINK=$(cat /tmp/cb/vmess.txt)

          # ── QR codes ─────────────────────────────────────────────────────
          QR_VLESS="" ; QR_VMESS="" ; QR_SUB=""
          if [ "${QRCODE_OK}" = "true" ]; then
            python3 - <<PYEOF
          import qrcode, base64
          from qrcode.constants import ERROR_CORRECT_M
          for data, path in [
              ("${VLESS_LINK}", "/tmp/cb/qr-vless.png"),
              ("${VMESS_LINK}", "/tmp/cb/qr-vmess.png"),
              ("${SUB_URL}",    "/tmp/cb/qr-sub.png"),
          ]:
              qr = qrcode.QRCode(None, ERROR_CORRECT_M, box_size=6, border=2)
              qr.add_data(data); qr.make(fit=True)
              img = qr.make_image(fill_color="#00ffcc", back_color="#0a0a2e")
              img.save(path, "PNG")
              b64 = base64.b64encode(open(path,"rb").read()).decode()
              open(path+".b64","w").write(b64)
              print(f"  ✅ {path}")
          PYEOF
            QR_VLESS=$(cat /tmp/cb/qr-vless.png.b64 2>/dev/null || echo "")
            QR_VMESS=$(cat /tmp/cb/qr-vmess.png.b64 2>/dev/null || echo "")
            QR_SUB=$(cat   /tmp/cb/qr-sub.png.b64   2>/dev/null || echo "")
          fi

          [ "${HEALTH_OK}" = "true" ] && STATUS_BADGE="🟢 LIVE" || STATUS_BADGE="🟡 PROPAGATING"
          [ -n "${PROXY_IP}" ] \
            && PROXY_ROW="| Relay IP | \`${PROXY_IP}\` |" \
            || PROXY_ROW="| Relay IP | *not set — direct mode* |"

          # ════════════════════════════════════════════════════════════════
          # SUMMARY — SVG banner + full layout
          # ════════════════════════════════════════════════════════════════

          # ── SVG Banner (written via python to avoid bash escaping hell) ───
          python3 - <<PYEOF
          banner = r"""<div align="center">

          <svg width="100%" viewBox="0 0 860 180" xmlns="http://www.w3.org/2000/svg" role="img">
            <title>CloudBreak — VLESS + VMess Proxy on Cloudflare Workers</title>
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"   stop-color="#0a0a2e"/>
                <stop offset="100%" stop-color="#0d1f3c"/>
              </linearGradient>
              <linearGradient id="gtext" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="#00ffcc"/>
                <stop offset="50%"  stop-color="#7bfff8"/>
                <stop offset="100%" stop-color="#00cfff"/>
              </linearGradient>
              <linearGradient id="gline" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="#00ffcc" stop-opacity="0"/>
                <stop offset="30%"  stop-color="#00ffcc"/>
                <stop offset="70%"  stop-color="#00cfff"/>
                <stop offset="100%" stop-color="#00cfff" stop-opacity="0"/>
              </linearGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <rect width="860" height="180" rx="14" fill="url(#bg)"/>
            <rect width="860" height="180" rx="14" fill="none" stroke="#00ffcc" stroke-width="0.5" stroke-opacity="0.3"/>
            <rect x="1" y="1" width="858" height="178" rx="13" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.05"/>
            <!-- Grid lines -->
            <line x1="0" y1="60"  x2="860" y2="60"  stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
            <line x1="0" y1="120" x2="860" y2="120" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
            <line x1="215" y1="0" x2="215" y2="180" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
            <line x1="430" y1="0" x2="430" y2="180" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
            <line x1="645" y1="0" x2="645" y2="180" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
            <!-- Corner accents -->
            <path d="M14,2 L2,2 L2,14" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-opacity="0.7"/>
            <path d="M846,2 L858,2 L858,14" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-opacity="0.7"/>
            <path d="M14,178 L2,178 L2,166" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-opacity="0.7"/>
            <path d="M846,178 L858,178 L858,166" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-opacity="0.7"/>
            <!-- Divider line -->
            <rect x="80" y="133" width="700" height="1" fill="url(#gline)" opacity="0.5"/>
            <!-- Main title -->
            <text x="430" y="78"
                  font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
                  font-size="52" font-weight="700" letter-spacing="-1"
                  text-anchor="middle" fill="url(#gtext)" filter="url(#glow)">CloudBreak</text>
            <!-- Subtitle pills -->
            <rect x="124" y="95" width="90"  height="22" rx="11" fill="#00ffcc" fill-opacity="0.12" stroke="#00ffcc" stroke-width="0.5" stroke-opacity="0.5"/>
            <rect x="224" y="95" width="90"  height="22" rx="11" fill="#00cfff" fill-opacity="0.12" stroke="#00cfff" stroke-width="0.5" stroke-opacity="0.5"/>
            <rect x="324" y="95" width="116" height="22" rx="11" fill="#7bfff8" fill-opacity="0.08" stroke="#7bfff8" stroke-width="0.5" stroke-opacity="0.4"/>
            <rect x="450" y="95" width="100" height="22" rx="11" fill="#00ffcc" fill-opacity="0.08" stroke="#00ffcc" stroke-width="0.5" stroke-opacity="0.4"/>
            <rect x="560" y="95" width="88"  height="22" rx="11" fill="#00cfff" fill-opacity="0.08" stroke="#00cfff" stroke-width="0.5" stroke-opacity="0.4"/>
            <rect x="658" y="95" width="78"  height="22" rx="11" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.5"/>
            <text x="169" y="110" font-family="monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#00ffcc">VLESS</text>
            <text x="269" y="110" font-family="monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#00cfff">VMess</text>
            <text x="382" y="110" font-family="monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#7bfff8">WebSocket+TLS</text>
            <text x="500" y="110" font-family="monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#00ffcc">DPI-Proof</text>
            <text x="604" y="110" font-family="monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#00cfff">Free</text>
            <text x="697" y="110" font-family="monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#c084fc">60s deploy</text>
            <!-- Bottom tagline -->
            <text x="430" y="158"
                  font-family="monospace" font-size="11.5" letter-spacing="3"
                  text-anchor="middle" fill="#ffffff" fill-opacity="0.35">BREAK THROUGH EVERY WALL</text>
          </svg>

          </div>"""
          open("/tmp/cb/banner.html","w").write(banner)
          print("✅ Banner SVG written")
          PYEOF

          # ── SVG Traffic Flow diagram ──────────────────────────────────────
          python3 - <<PYEOF
          flow = r"""<details>
          <summary>🌐 Traffic Flow — How DPI evasion works</summary>

          <br>

          <div align="center">
          <svg width="100%" viewBox="0 0 860 110" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
                <path d="M2 1L8 5L2 9" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-linecap="round"/>
              </marker>
            </defs>
            <rect width="860" height="110" rx="10" fill="#0a0a2e"/>
            <!-- Nodes -->
            <rect x="20"  y="30" width="130" height="50" rx="8" fill="#0f1f40" stroke="#00ffcc"  stroke-width="0.8"/>
            <rect x="215" y="30" width="130" height="50" rx="8" fill="#0f1f40" stroke="#00cfff"  stroke-width="0.8"/>
            <rect x="410" y="30" width="160" height="50" rx="8" fill="#0f1f40" stroke="#7bfff8"  stroke-width="0.8"/>
            <rect x="635" y="30" width="130" height="50" rx="8" fill="#0f1f40" stroke="#a855f7"  stroke-width="0.8"/>
            <rect x="800" y="30" width="42"  height="50" rx="8" fill="#0f1f40" stroke="#00ffcc"  stroke-width="0.8"/>
            <!-- Labels -->
            <text x="85"  y="52" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#00ffcc">Your Device</text>
            <text x="85"  y="68" font-family="monospace" font-size="9"  text-anchor="middle" fill="#00ffcc" fill-opacity="0.6">VLESS client</text>
            <text x="280" y="52" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#00cfff">DPI Firewall</text>
            <text x="280" y="68" font-family="monospace" font-size="9"  text-anchor="middle" fill="#00cfff" fill-opacity="0.6">sees: HTTPS ✓</text>
            <text x="490" y="52" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#7bfff8">Cloudflare Edge</text>
            <text x="490" y="68" font-family="monospace" font-size="9"  text-anchor="middle" fill="#7bfff8" fill-opacity="0.6">real TLS · real SNI</text>
            <text x="700" y="52" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#c084fc">CF Worker</text>
            <text x="700" y="68" font-family="monospace" font-size="9"  text-anchor="middle" fill="#c084fc" fill-opacity="0.6">proxy engine</text>
            <text x="821" y="52" font-family="monospace" font-size="13" font-weight="700" text-anchor="middle" fill="#00ffcc">🌍</text>
            <text x="821" y="68" font-family="monospace" font-size="8"  text-anchor="middle" fill="#00ffcc" fill-opacity="0.6">free</text>
            <!-- Arrows -->
            <line x1="152" y1="55" x2="212" y2="55" stroke="#00ffcc" stroke-width="1.2" marker-end="url(#arr2)"/>
            <line x1="347" y1="55" x2="407" y2="55" stroke="#00cfff" stroke-width="1.2" marker-end="url(#arr2)"/>
            <line x1="572" y1="55" x2="632" y2="55" stroke="#7bfff8" stroke-width="1.2" marker-end="url(#arr2)"/>
            <line x1="767" y1="55" x2="797" y2="55" stroke="#a855f7" stroke-width="1.2" marker-end="url(#arr2)"/>
            <!-- Step labels -->
            <text x="182" y="46" font-family="monospace" font-size="8" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">TLS 1.3</text>
            <text x="377" y="46" font-family="monospace" font-size="8" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">✓ allowed</text>
            <text x="602" y="46" font-family="monospace" font-size="8" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">decrypts</text>
            <text x="782" y="46" font-family="monospace" font-size="8" text-anchor="middle" fill="#ffffff" fill-opacity="0.4">TCP</text>
          </svg>
          </div>

          </details>"""
          open("/tmp/cb/flow.html","w").write(flow)
          print("✅ Flow SVG written")
          PYEOF

          # ── Build the full summary ────────────────────────────────────────
          cat /tmp/cb/banner.html >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n' >> "$GITHUB_STEP_SUMMARY"

          # Status table
          printf '<div align="center">\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '**%s** &nbsp;·&nbsp; Run [#%s](../../actions/runs/%s) &nbsp;·&nbsp; `%s`\n\n' \
            "${STATUS_BADGE}" "${{ github.run_number }}" "${{ github.run_id }}" "${DEPLOY_TIME}" \
            >> "$GITHUB_STEP_SUMMARY"
          printf '</div>\n\n---\n\n' >> "$GITHUB_STEP_SUMMARY"

          # QR section
          if [ -n "${QR_VLESS}" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
          ## 📱 Scan to Connect

          <div align="center">
          <table>
          <tr>
            <th align="center">⚡ VLESS</th>
            <th align="center">🔮 VMess</th>
            <th align="center">📡 Subscription</th>
                      </tr>
          <tr>
            <td align="center">
              <sub>V2rayNG · Hiddify · Streisand</sub><br><br>
          SUMEOF
            printf '<img src="data:image/png;base64,%s" width="200"/>\n' "${QR_VLESS}" >> "$GITHUB_STEP_SUMMARY"
            printf '    </td>\n    <td align="center">\n      <sub>V2rayN · Clash · NekoBox</sub><br><br>\n' >> "$GITHUB_STEP_SUMMARY"
            printf '<img src="data:image/png;base64,%s" width="200"/>\n' "${QR_VMESS}" >> "$GITHUB_STEP_SUMMARY"
            printf '    </td>\n    <td align="center">\n      <sub>All clients · auto-updates</sub><br><br>\n' >> "$GITHUB_STEP_SUMMARY"
            printf '<img src="data:image/png;base64,%s" width="200"/>\n' "${QR_SUB}"   >> "$GITHUB_STEP_SUMMARY"
            cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
            </td>
          </tr>
          </table>
          </div>

          ---

          SUMEOF
          fi

          # Connection links
          printf '## 🔗 Connection Links\n' >> "$GITHUB_STEP_SUMMARY"
          printf '> 💡 Click the **copy icon** on any code block\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '### ⚡ VLESS\n```\n%s\n```\n\n' "${VLESS_LINK}" >> "$GITHUB_STEP_SUMMARY"
          printf '### 🔮 VMess\n```\n%s\n```\n\n' "${VMESS_LINK}" >> "$GITHUB_STEP_SUMMARY"
          printf '### 📡 Subscription URL\n' >> "$GITHUB_STEP_SUMMARY"
          printf '> Import once — auto-updates every redeploy.\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '```\n%s\n```\n\n---\n\n' "${SUB_URL}" >> "$GITHUB_STEP_SUMMARY"

          # Manual config table
          printf '## ⚙️ Manual Configuration\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '| Parameter | Value |\n|:---|:---|\n' >> "$GITHUB_STEP_SUMMARY"
          printf '| Address | `%s` |\n'        "${HOST}"    >> "$GITHUB_STEP_SUMMARY"
          printf '| Port | `443` |\n'                       >> "$GITHUB_STEP_SUMMARY"
          printf '| UUID | `%s` |\n'           "${UUID}"    >> "$GITHUB_STEP_SUMMARY"
          printf '| WS Path | `%s` |\n'        "${WS_PATH}" >> "$GITHUB_STEP_SUMMARY"
          printf '| TLS | `true` |\n'                       >> "$GITHUB_STEP_SUMMARY"
          printf '| SNI | `%s` |\n'            "${HOST}"    >> "$GITHUB_STEP_SUMMARY"
          printf '| Fingerprint | `chrome` |\n'             >> "$GITHUB_STEP_SUMMARY"
          printf '| ALPN | `h2, http/1.1` |\n'              >> "$GITHUB_STEP_SUMMARY"
          printf '| Encryption | `none` |\n'                >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n\n---\n\n' "${PROXY_ROW}"             >> "$GITHUB_STEP_SUMMARY"

          # Traffic flow diagram
          cat /tmp/cb/flow.html >> "$GITHUB_STEP_SUMMARY"
          printf '\n\n' >> "$GITHUB_STEP_SUMMARY"

          # Collapsible sections
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'

          <details>
          <summary>📱 Compatible Clients</summary>

          | Client | Platform | VLESS | VMess | Sub |
          |:---|:---|:---:|:---:|:---:|
          | [Hiddify](https://github.com/hiddify/hiddify-next) | All 🇮🇷 | ✅ | ✅ | ✅ |
          | [V2rayNG](https://github.com/2dust/v2rayNG) | Android | ✅ | ✅ | ✅ |
          | [V2rayN](https://github.com/2dust/v2rayN) | Windows | ✅ | ✅ | ✅ |
          | [Streisand](https://apps.apple.com/app/streisand/id6450534064) | iOS | ✅ | ✅ | ✅ |
          | [Shadowrocket](https://apps.apple.com/app/shadowrocket/id932747918) | iOS | ✅ | ✅ | ✅ |
          | [Clash.Meta](https://github.com/MetaCubeX/mihomo) | All | ✅ | ✅ | ✅ |
          | [NekoBox](https://github.com/MatsuriDayo/NekoBoxForAndroid) | Android | ✅ | ✅ | ✅ |

          </details>

          ---

          > 🔄 **Key rotation:** Re-run this workflow any time — fresh UUID + WS path every run.
          > Share the **Subscription URL** with your clients — it always has the latest credentials.

          SUMEOF
          
          echo "✅ Summary complete"

      # ══════════════════════════════════════════════════════════════════════
      # 8 ▸ Upload artifact
      # ══════════════════════════════════════════════════════════════════════
      - name: "📎 Upload config artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "cloudbreak-run-${{ github.run_number }}"
          path: /tmp/cb/
          retention-days: 30

      # ══════════════════════════════════════════════════════════════════════
      # 9 ▸ Final console status
      # ══════════════════════════════════════════════════════════════════════
      - name: "📊 Final status"
        if: always()
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          echo ""
          echo "┌────────────────────────────────────────────────────────┐"
          if [ "${{ job.status }}" = "success" ]; then
          echo "│      ✅  CLOUDBREAK DEPLOYED SUCCESSFULLY              │"
          else
          echo "│      ❌  DEPLOYMENT HAD ERRORS — CHECK LOGS ABOVE     │"
          fi
          echo "├────────────────────────────────────────────────────────┤"
          printf "│  URL    : %-45s │\n" "${URL:-n/a}"
          printf "│  Health : %-45s │\n" "${{ steps.deploy.outputs.health_ok }}"
          printf "│  Run    : #%-44s │\n" "${{ github.run_number }}"
          echo "└────────────────────────────────────────────────────────┘"
          
