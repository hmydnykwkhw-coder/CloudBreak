          echo "✅ Summary written"
          cp /tmp/cb/config.json ./cloudbreak-config.json

      # ══════════════════════════════════════════════════════════════════════
      # 8 ▸ Upload config artifact
      # ══════════════════════════════════════════════════════════════════════
      - name: "📦 Upload config artifact"
        uses: actions/upload-artifact@v4
        with:
          name: cloudbreak-config
          path: cloudbreak-config.json
          retention-days: 1
