name: "⚡ Deploy CloudBreak Worker"

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: "Worker name (unique in your Cloudflare account)"
        required: true
        default: "vless-ir"
      proxy_ip:
        description: "PROXYIP (optional) — relay IP if workers.dev is blocked in your region"
        required: false
        default: ""

concurrency:
  group: deploy-cloudbreak
  cancel-in-progress: false

jobs:
  deploy:
    name: "CloudBreak — VLESS + VMess Deploy"
    runs-on: ubuntu-latest

    steps:

      # ══════════════════════════════════════════════════════════════════════
      # 1 ▸ Checkout
      # ══════════════════════════════════════════════════════════════════════
      - name: "📦 Checkout"
        uses: actions/checkout@v4

      # ══════════════════════════════════════════════════════════════════════
      # 2 ▸ Validate secrets (fail fast before wasting time on installs)
      # ══════════════════════════════════════════════════════════════════════
      - name: "🔐 Validate secrets"
        run: |
          FAIL=0

          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error title=Missing Secret::CLOUDFLARE_API_TOKEN is not set."
            echo "  → Settings → Secrets and variables → Actions → New repository secret"
            FAIL=1
          else
            echo "✅ CLOUDFLARE_API_TOKEN present"
          fi

          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error title=Missing Secret::CLOUDFLARE_ACCOUNT_ID is not set."
            echo "  → Cloudflare Dashboard → Workers & Pages → right sidebar"
            FAIL=1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID present"
          fi

          # Validate worker name (alphanumeric + hyphens only)
          WORKER_NAME="${{ github.event.inputs.worker_name }}"
          if ! echo "${WORKER_NAME}" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9-]{0,62}$'; then
            echo "::error title=Invalid Input::worker_name '${WORKER_NAME}' is invalid."
            echo "  → Must be alphanumeric + hyphens, max 63 chars, cannot start with hyphen"
            FAIL=1
          else
            echo "✅ Worker name valid: ${WORKER_NAME}"
          fi

          [ "${FAIL}" -eq 0 ] || exit 1

      # ══════════════════════════════════════════════════════════════════════
      # 3 ▸ Validate worker.js
      # ══════════════════════════════════════════════════════════════════════
      - name: "📄 Validate worker.js"
        run: |
          if [ ! -f "worker.js" ]; then
            echo "::error title=File Missing::worker.js not found in repository root"
            echo "Files in root:"
            ls -la
            exit 1
          fi

          if ! grep -q "export default" worker.js; then
            echo "::error title=Invalid Worker::worker.js has no 'export default' — not a valid ES module"
            exit 1
          fi

          LINES=$(wc -l < worker.js)
          SIZE=$(wc -c < worker.js)
          echo "✅ worker.js OK — ${LINES} lines, ${SIZE} bytes"

          # Warn if approaching the 1 MB Cloudflare free-plan limit
          if [ "${SIZE}" -gt 900000 ]; then
            echo "::warning title=Size Warning::worker.js is ${SIZE} bytes — approaching 1 MB Cloudflare limit"
          fi

      # ══════════════════════════════════════════════════════════════════════
      # 4 ▸ Install tools
      # ══════════════════════════════════════════════════════════════════════
      - name: "🔧 Install Wrangler + Python deps"
        run: |
          echo "── Wrangler ─────────────────────────────────────────────"
          for attempt in 1 2 3; do
            if npm install -g wrangler 2>&1; then
              WVER=$(wrangler --version 2>&1 || echo "unknown")
              echo "✅ Wrangler installed: ${WVER}"
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              echo "::error title=Install Failed::npm install -g wrangler failed after 3 attempts"
              exit 1
            fi
            echo "  Attempt ${attempt} failed — retrying in 5s…"
            sleep 5
          done

          echo "── Python qrcode ─────────────────────────────────────────"
          if pip install "qrcode[pil]" pillow --quiet 2>&1; then
            echo "QRCODE_OK=true" >> "$GITHUB_ENV"
            echo "✅ qrcode ready"
          else
            echo "QRCODE_OK=false" >> "$GITHUB_ENV"
            echo "::warning title=QR Skip::qrcode install failed — QR codes will be omitted"
          fi

      # ══════════════════════════════════════════════════════════════════════
      # 5 ▸ Generate cryptographic credentials
      # ══════════════════════════════════════════════════════════════════════
      - name: "🔑 Generate UUID + WS path"
        id: keygen
        run: |
          # UUID from kernel entropy
          UUID=$(cat /proc/sys/kernel/random/uuid)
          if ! echo "${UUID}" | grep -qE \
               '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "::error title=Keygen Failed::UUID generation produced invalid output: ${UUID}"
            exit 1
          fi

          # 12-char random hex WS path
          WS_PATH="/$(openssl rand -hex 6)"
          if [ -z "${WS_PATH}" ] || [ "${WS_PATH}" = "/" ]; then
            echo "::error title=Keygen Failed::WS_PATH generation failed"
            exit 1
          fi

          DEPLOY_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          {
            echo "uuid=${UUID}"
            echo "ws_path=${WS_PATH}"
            echo "deploy_time=${DEPLOY_TIME}"
          } >> "$GITHUB_OUTPUT"

          echo "✅ UUID:      ${UUID}"
          echo "✅ WS Path:   ${WS_PATH}"
          echo "✅ Timestamp: ${DEPLOY_TIME}"

      # ══════════════════════════════════════════════════════════════════════
      # 6 ▸ Deploy (with retry — no delete, no command substitution)
      # ══════════════════════════════════════════════════════════════════════
      - name: "🚀 Deploy to Cloudflare Workers"
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WORKER_NAME="${{ github.event.inputs.worker_name }}"
          UUID="${{ steps.keygen.outputs.uuid }}"
          WS_PATH="${{ steps.keygen.outputs.ws_path }}"
          DEPLOY_TIME="${{ steps.keygen.outputs.deploy_time }}"
          PROXY_IP="${{ github.event.inputs.proxy_ip }}"

          # Build --var array  (array avoids ALL word-splitting / glob issues)
          declare -a VARS=(
            "--var" "UUID:${UUID}"
            "--var" "WS_PATH:${WS_PATH}"
            "--var" "DEPLOY_TIME:${DEPLOY_TIME}"
          )
          [ -n "${PROXY_IP}" ] && VARS+=("--var" "PROXYIP:${PROXY_IP}")

          # Workers.dev URL is always predictable — never parse wrangler output
          WORKER_URL="https://${WORKER_NAME}.workers.dev"
          HOST="${WORKER_NAME}.workers.dev"

          echo "Target URL : ${WORKER_URL}"
          echo "WS Path    : ${WS_PATH}"
          echo "ProxyIP    : ${PROXY_IP:-<none>}"

          # ── Retry loop (up to 3 attempts) ──────────────────────────────
          DEPLOY_EXIT=1
          for attempt in 1 2 3; do
            echo ""
            echo "── Deploy attempt ${attempt}/3 ──────────────────────────────"

            # Disable pipefail around tee so we capture exit code correctly
            set +e
            wrangler deploy worker.js \
              --name "${WORKER_NAME}" \
              --compatibility-date 2024-12-01 \
              "${VARS[@]}" \
              2>&1 | tee /tmp/wrangler-deploy.log
            DEPLOY_EXIT=${PIPESTATUS[0]}
            set -e

            echo "wrangler exit code: ${DEPLOY_EXIT}"

            if [ "${DEPLOY_EXIT}" -eq 0 ]; then
              echo "✅ Wrangler reported success on attempt ${attempt}"
              break
            fi

            # ── Classify the error for a helpful message ────────────────
            LOG=$(cat /tmp/wrangler-deploy.log)
            if echo "${LOG}" | grep -qi "10000\|authentication\|API token\|Forbidden\|401\|403"; then
              echo "::error title=Auth Error::API token invalid or lacks Workers Scripts:Edit permission"
              exit 1   # No point retrying auth errors
            elif echo "${LOG}" | grep -qi "10021\|subdomain\|workers.dev.*not.*enabled"; then
              echo "::error title=Subdomain Error::workers.dev subdomain not activated"
              echo "  → Cloudflare Dashboard → Workers & Pages → enable workers.dev"
              exit 1
            elif echo "${LOG}" | grep -qi "syntax\|SyntaxError\|Unexpected token"; then
              echo "::error title=Syntax Error::worker.js has a syntax/parse error"
              exit 1
            elif echo "${LOG}" | grep -qi "too large\|exceeded\|size"; then
              echo "::error title=Size Error::worker.js exceeds Cloudflare size limit"
              exit 1
            fi

            if [ "${attempt}" -lt 3 ]; then
              echo "  Transient error — retrying in 10s…"
              sleep 10
            fi
          done

          # ── Determine success via health endpoint (not exit code) ───────
          # Cloudflare edge propagation can take up to ~30s
          echo ""
          echo "── Health verification (up to 60s) ─────────────────────"
          HEALTH_OK=false
          for i in $(seq 1 12); do
            HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" \
                   --max-time 8 --connect-timeout 5 \
                   "${WORKER_URL}/health" 2>/dev/null || echo "000")
            echo "  [${i}/12] GET /health → HTTP ${HTTP}"
            if [ "${HTTP}" = "200" ]; then
              HEALTH_OK=true
              echo "✅ Worker is live!"
              break
            fi
            sleep 5
          done

          if [ "${HEALTH_OK}" = "false" ]; then
            if [ "${DEPLOY_EXIT}" -ne 0 ]; then
              # Both wrangler AND health failed — real failure
              echo "::error title=Deploy Failed::wrangler exit ${DEPLOY_EXIT} AND health check timed out"
              echo "Full wrangler log:"
              cat /tmp/wrangler-deploy.log
              exit 1
            else
              # Wrangler OK but health not yet responding — probably still propagating
              echo "::warning title=Propagating::wrangler succeeded but /health not yet responding"
              echo "  Worker may still be propagating. Check ${WORKER_URL}/health manually."
            fi
          fi

          {
            echo "worker_url=${WORKER_URL}"
            echo "host=${HOST}"
            echo "health_ok=${HEALTH_OK}"
          } >> "$GITHUB_OUTPUT"

      # ══════════════════════════════════════════════════════════════════════
      # 7 ▸ Build configs + QR codes + beautiful summary
      # ══════════════════════════════════════════════════════════════════════
      - name: "📋 Generate links, QR codes, and summary"
        run: |
          set -euo pipefail

          UUID="${{ steps.keygen.outputs.uuid }}"
          WS_PATH="${{ steps.keygen.outputs.ws_path }}"
          DEPLOY_TIME="${{ steps.keygen.outputs.deploy_time }}"
          WORKER_URL="${{ steps.deploy.outputs.worker_url }}"
          HOST="${{ steps.deploy.outputs.host }}"
          HEALTH_OK="${{ steps.deploy.outputs.health_ok }}"
          PROXY_IP="${{ github.event.inputs.proxy_ip }}"
          SUB_URL="${WORKER_URL}/sub"

          mkdir -p /tmp/cb

          # ── Generate links via Python (safe URL encoding) ──────────────
          python3 - <<PYEOF
          import urllib.parse, json, base64, sys

          uuid     = "${UUID}"
          host     = "${HOST}"
          ws_path  = "${WS_PATH}"
          worker   = "${WORKER_URL}"
          sub_url  = "${SUB_URL}"
          deploy   = "${DEPLOY_TIME}"

          # VLESS
          params = urllib.parse.urlencode({
              "encryption": "none", "security": "tls", "sni": host,
              "fp": "chrome", "type": "ws", "host": host,
              "path": ws_path, "alpn": "h2,http/1.1",
          })
          vless = f"vless://{uuid}@{host}:443?{params}#CF-VLESS-IR"

          # VMess
          cfg = {
              "v":"2","ps":"CF-VMess-IR","add":host,"port":443,"id":uuid,
              "aid":0,"net":"ws","type":"none","host":host,"path":ws_path,
              "tls":"tls","sni":host,"alpn":"h2,http/1.1","fp":"chrome",
          }
          vmess = "vmess://" + base64.b64encode(
              json.dumps(cfg, separators=(",",":")).encode()
          ).decode()

          with open("/tmp/cb/vless.txt",  "w") as f: f.write(vless)
          with open("/tmp/cb/vmess.txt",  "w") as f: f.write(vmess)
          with open("/tmp/cb/sub.txt",    "w") as f: f.write(sub_url)
          with open("/tmp/cb/config.json","w") as f:
              json.dump({
                  "generated": deploy,
                  "worker_url": worker,
                  "vless": vless, "vmess": vmess,
                  "subscription": sub_url,
                  "manual": {
                      "address": host, "port": 443, "uuid": uuid,
                      "ws_path": ws_path, "tls": True, "sni": host,
                      "fingerprint": "chrome", "alpn": ["h2","http/1.1"],
                      "encryption": "none",
                  }
              }, f, indent=2)

          print("VLESS=" + vless,  file=open("/tmp/cb/env.sh","w"))
          print("VMESS=" + vmess,  file=open("/tmp/cb/env.sh","a"))
          print("SUB="   + sub_url,file=open("/tmp/cb/env.sh","a"))
          print("✅ Links generated")
          PYEOF

          VLESS_LINK=$(cat /tmp/cb/vless.txt)
          VMESS_LINK=$(cat /tmp/cb/vmess.txt)

          # ── QR codes ───────────────────────────────────────────────────
          if [ "${QRCODE_OK}" = "true" ]; then
            python3 - <<PYEOF
          import qrcode, base64
          from qrcode.constants import ERROR_CORRECT_M

          ITEMS = [
              ("${VLESS_LINK}", "/tmp/cb/qr-vless.png"),
              ("${VMESS_LINK}", "/tmp/cb/qr-vmess.png"),
              ("${SUB_URL}",    "/tmp/cb/qr-sub.png"),
          ]
          for data, path in ITEMS:
              qr = qrcode.QRCode(None, ERROR_CORRECT_M, box_size=6, border=2)
              qr.add_data(data); qr.make(fit=True)
              img = qr.make_image(fill_color="#00ffcc", back_color="#0a0a2e")
              img.save(path, "PNG")
              with open(path,"rb") as f:
                  b64 = base64.b64encode(f.read()).decode()
              with open(path+".b64","w") as f:
                  f.write(b64)
              print(f"  ✅ {path}")
          PYEOF
            QR_VLESS=$(cat /tmp/cb/qr-vless.png.b64 2>/dev/null || echo "")
            QR_VMESS=$(cat /tmp/cb/qr-vmess.png.b64 2>/dev/null || echo "")
            QR_SUB=$(cat   /tmp/cb/qr-sub.png.b64   2>/dev/null || echo "")
          else
            QR_VLESS=""
            QR_VMESS=""
            QR_SUB=""
          fi

          # ── Badges ─────────────────────────────────────────────────────
          if [ "${HEALTH_OK}" = "true" ]; then
            STATUS_ICON="🟢"
            STATUS_TEXT="LIVE"
          else
            STATUS_ICON="🟡"
            STATUS_TEXT="PROPAGATING"
          fi
          [ -n "${PROXY_IP}" ] && PROXY_ROW="| Relay IP | \`${PROXY_IP}\` |" \
                               || PROXY_ROW="| Relay IP | *not set — direct mode* |"

          # ════════════════════════════════════════════════════════════════
          # SUMMARY — ASCII art banner (SVG inline)
          # ════════════════════════════════════════════════════════════════
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
          <div align="center">

          ```
          ██████╗██╗      ██████╗ ██╗   ██╗██████╗ ██████╗ ███████╗ █████╗ ██╗  ██╗
          ██╔════╝██║     ██╔═══██╗██║   ██║██╔══██╗██╔══██╗██╔════╝██╔══██╗██║ ██╔╝
          ██║     ██║     ██║   ██║██║   ██║██║  ██║██████╔╝█████╗  ███████║█████╔╝ 
          ██║     ██║     ██║   ██║██║   ██║██║  ██║██╔══██╗██╔══╝  ██╔══██║██╔═██╗ 
          ╚██████╗███████╗╚██████╔╝╚██████╔╝██████╔╝██████╔╝███████╗██║  ██║██║  ██╗
           ╚═════╝╚══════╝ ╚═════╝  ╚═════╝ ╚═════╝ ╚═════╝ ╚══════╝╚═╝  ╚═╝╚═╝  ╚═╝
                            VLESS + VMess · Cloudflare Workers · DPI-Proof
          ```

          </div>

          ---
          SUMEOF

          # Status bar (dynamic)
          printf '<div align="center">\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '### %s Deployment %s — Run [#%s](../../actions/runs/%s)\n\n' \
            "${STATUS_ICON}" "${STATUS_TEXT}" \
            "${{ github.run_number }}" "${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          printf '| | |\n|:--|:--|\n' >> "$GITHUB_STEP_SUMMARY"
          printf '| 🌐 Worker | [`%s`](%s) |\n' "${WORKER_URL}" "${WORKER_URL}" >> "$GITHUB_STEP_SUMMARY"
          printf '| 📡 Subscription | [`%s`](%s) |\n' "${SUB_URL}" "${SUB_URL}" >> "$GITHUB_STEP_SUMMARY"
          printf '| 🕐 Deployed | `%s` |\n' "${DEPLOY_TIME}" >> "$GITHUB_STEP_SUMMARY"
          printf '\n</div>\n\n---\n\n' >> "$GITHUB_STEP_SUMMARY"

          # ── QR CODES ───────────────────────────────────────────────────
          if [ -n "${QR_VLESS}" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
          ## 📱 Scan to Connect

          <div align="center">
          <table>
          <tr>
            <th align="center">⚡ VLESS</th>
            <th align="center">🔮 VMess</th>
            <th align="center">📡 Subscription</th>
          </tr>
          <tr>
            <td align="center"><sub>V2rayNG · Hiddify · Streisand</sub><br><br>
          SUMEOF
            printf '<img src="data:image/png;base64,' >> "$GITHUB_STEP_SUMMARY"
            printf '%s' "${QR_VLESS}" >> "$GITHUB_STEP_SUMMARY"
            printf '" width="200" height="200" />' >> "$GITHUB_STEP_SUMMARY"
            cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
            </td>
            <td align="center"><sub>V2rayN · Clash.Meta · NekoBox</sub><br><br>
          SUMEOF
            printf '<img src="data:image/png;base64,' >> "$GITHUB_STEP_SUMMARY"
            printf '%s' "${QR_VMESS}" >> "$GITHUB_STEP_SUMMARY"
            printf '" width="200" height="200" />' >> "$GITHUB_STEP_SUMMARY"
            cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
            </td>
            <td align="center"><sub>All clients · Auto-updates on redeploy</sub><br><br>
          SUMEOF
            printf '<img src="data:image/png;base64,' >> "$GITHUB_STEP_SUMMARY"
            printf '%s' "${QR_SUB}" >> "$GITHUB_STEP_SUMMARY"
            printf '" width="200" height="200" />' >> "$GITHUB_STEP_SUMMARY"
            cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
            </td>
          </tr>
          </table>
          </div>

          ---

          SUMEOF
          fi

          # ── CONNECTION LINKS ───────────────────────────────────────────
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
          ## 🔗 Connection Links
          > 💡 Click the **copy icon** on any code block to copy the full link.

          ### ⚡ VLESS
          SUMEOF
          printf '```\n%s\n```\n\n' "${VLESS_LINK}" >> "$GITHUB_STEP_SUMMARY"

          printf '### 🔮 VMess\n' >> "$GITHUB_STEP_SUMMARY"
          printf '```\n%s\n```\n\n' "${VMESS_LINK}" >> "$GITHUB_STEP_SUMMARY"

          printf '### 📡 Subscription URL\n' >> "$GITHUB_STEP_SUMMARY"
          printf '> Import this URL into any client to get all configs at once.\n' >> "$GITHUB_STEP_SUMMARY"
          printf '> It always serves the **latest credentials** after every redeploy.\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf '```\n%s\n```\n\n---\n\n' "${SUB_URL}" >> "$GITHUB_STEP_SUMMARY"

          # ── MANUAL CONFIG TABLE ────────────────────────────────────────
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
          ## ⚙️ Manual Configuration

          | Parameter | Value |
          |:----------|:------|
          SUMEOF
          printf '| 🖥️ &nbsp;Address | `%s` |\n'         "${HOST}"     >> "$GITHUB_STEP_SUMMARY"
          printf '| 🔌 &nbsp;Port | `443` |\n'                          >> "$GITHUB_STEP_SUMMARY"
          printf '| 🔑 &nbsp;UUID | `%s` |\n'             "${UUID}"     >> "$GITHUB_STEP_SUMMARY"
          printf '| 🛤️ &nbsp;WS Path | `%s` |\n'          "${WS_PATH}"  >> "$GITHUB_STEP_SUMMARY"
          printf '| 🔒 &nbsp;TLS | `true` |\n'                          >> "$GITHUB_STEP_SUMMARY"
          printf '| 🏷️ &nbsp;SNI | `%s` |\n'              "${HOST}"     >> "$GITHUB_STEP_SUMMARY"
          printf '| 🕵️ &nbsp;Fingerprint | `chrome` |\n'                >> "$GITHUB_STEP_SUMMARY"
          printf '| 📶 &nbsp;ALPN | `h2, http/1.1` |\n'                 >> "$GITHUB_STEP_SUMMARY"
          printf '| 🔐 &nbsp;Encryption | `none` *(payload inside TLS)* |\n' >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "${PROXY_ROW}" >> "$GITHUB_STEP_SUMMARY"
          printf '\n---\n\n' >> "$GITHUB_STEP_SUMMARY"

          # ── COLLAPSIBLE SECTIONS ───────────────────────────────────────
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
          <details>
          <summary>🌐 Worker Endpoints</summary>

          | Endpoint | Purpose |
          |:---------|:--------|
          SUMEOF
          printf '| [`%s%s`](%s%s) | WebSocket proxy entry |\n' \
            "${WORKER_URL}" "${WS_PATH}" "${WORKER_URL}" "${WS_PATH}" >> "$GITHUB_STEP_SUMMARY"
          printf '| [`%s/sub`](%s/sub) | Base64 subscription feed |\n' \
            "${WORKER_URL}" "${WORKER_URL}" >> "$GITHUB_STEP_SUMMARY"
          printf '| [`%s/health`](%s/health) | JSON health-check |\n' \
            "${WORKER_URL}" "${WORKER_URL}" >> "$GITHUB_STEP_SUMMARY"
          printf '| [`%s/`](%s/) | Root ping |\n\n' \
            "${WORKER_URL}" "${WORKER_URL}" >> "$GITHUB_STEP_SUMMARY"
          printf '</details>\n\n' >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMEOF'
          <details>
          <summary>🛡️ How DPI evasion works</summary>

          ```
          ┌─────────────────────────┬──────────────────────────────────────────────┐
          │ What DPI inspects       │ What DPI actually sees                       │
          ├─────────────────────────┼──────────────────────────────────────────────┤
          │ Destination IP          │ Cloudflare anycast — globally trusted CDN    │
          │ TLS certificate         │ Genuine Cloudflare cert, full valid chain    │
          │ SNI field               │ Real *.workers.dev — whitelisted everywhere  │
          │ TLS fingerprint         │ Standard TLS 1.3 — Chrome browser profile   │
          │ HTTP headers            │ Normal Connection: Upgrade WebSocket         │
          │ Traffic pattern         │ Indistinguishable from HTTPS browsing        │
          │ Port                    │ 443 — never blocked by any ISP               │
          │ Payload                 │ Encrypted VLESS inside TLS — fully opaque   │
          └─────────────────────────┴──────────────────────────────────────────────┘
          ```

          </details>

          <details>
          <summary>📱 Compatible clients</summary>

          | Client | Platform | VLESS | VMess | Sub |
          |:-------|:---------|:-----:|:-----:|:---:|
          | [Hiddify](https://github.com/hiddify/hiddify-next) | All 🇮🇷 | ✅ | ✅ | ✅ |
          | [V2rayNG](https://github.com/2dust/v2rayNG) | Android | ✅ | ✅ | ✅ |
          | [V2rayN](https://github.com/2dust/v2rayN) | Windows | ✅ | ✅ | ✅ |
          | [Streisand](https://apps.apple.com/app/streisand/id6450534064) | iOS | ✅ | ✅ | ✅ |
          | [Shadowrocket](https://apps.apple.com/app/shadowrocket/id932747918) | iOS | ✅ | ✅ | ✅ |
          | [Clash.Meta](https://github.com/MetaCubeX/mihomo) | All | ✅ | ✅ | ✅ |
          | [NekoBox](https://github.com/MatsuriDayo/NekoBoxForAndroid) | Android | ✅ | ✅ | ✅ |

          </details>

          ---

          > 🔄 **Key rotation:** Re-run this workflow any time to generate a fresh UUID and WS path.
          > The `/sub` URL always serves the latest credentials — subscription clients auto-update.

          SUMEOF

          echo "✅ Summary written"

      # ══════════════════════════════════════════════════════════════════════
      # 8 ▸ Upload artifact (always — even on failure for debug)
      # ══════════════════════════════════════════════════════════════════════
      - name: "📎 Upload config artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "cloudbreak-run-${{ github.run_number }}"
          path: /tmp/cb/
          retention-days: 30

      # ══════════════════════════════════════════════════════════════════════
      # 9 ▸ Final console summary
      # ══════════════════════════════════════════════════════════════════════
      - name: "📊 Final status"
        if: always()
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          HEALTH="${{ steps.deploy.outputs.health_ok }}"
          echo ""
          echo "┌────────────────────────────────────────────────────────┐"
          if [ "${{ job.status }}" = "success" ]; then
          echo "│          ✅  CLOUDBREAK DEPLOYED SUCCESSFULLY          │"
          else
          echo "│          ❌  DEPLOYMENT HAD ERRORS — CHECK LOGS        │"
          fi
          echo "├────────────────────────────────────────────────────────┤"
          printf "│  URL    : %-45s │\n" "${URL:-n/a}"
          printf "│  Health : %-45s │\n" "${HEALTH:-unknown}"
          printf "│  Run    : #%-44s │\n" "${{ github.run_number }}"
          echo "└────────────────────────────────────────────────────────┘"
